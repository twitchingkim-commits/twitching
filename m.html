<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>나의 해방일지 v8.1 Mobile Full</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --sk-red: #E02020; --navy: #0A1F44; --bg-color: #F4F7F9; --border-color: #E2E8F0; }
        body { font-family: 'Pretendard', sans-serif; margin: 0; background-color: var(--bg-color); color: var(--navy); padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0; -webkit-font-smoothing: antialiased; }
        
        /* 헤더 고정 및 버튼 */
        .header { padding: 12px 15px; border-bottom: 2px solid var(--sk-red); position: sticky; top: 0; background: var(--bg-color); z-index: 1000; }
        .header h1 { margin: 0 0 10px 0; font-size: 18px; font-weight: 800; text-align: center; }
        .btn-group { display: flex; gap: 6px; }
        .btn-common { flex: 1; padding: 12px 0; border-radius: 8px; font-weight: 700; font-size: 12px; cursor: pointer; border: none; color: white; }
        .btn-fetch { background: var(--sk-red); }
        .btn-manage { background: var(--navy); }
        .btn-ai { background: linear-gradient(135deg, #6366F1 0%, #A855F7 100%); }

        /* 섹션 타이틀 */
        .section-header { background: #F8FAFC; color: var(--sk-red); font-weight: 800; font-size: 13px; padding: 12px 15px; margin-top: 20px; border-left: 5px solid var(--sk-red); }
        
        /* 테이블 영역 최적화 (가로 스크롤 및 고정 열) */
        .table-wrapper { background: #fff; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { border-collapse: collapse; width: 100%; font-size: 11px; min-width: 1100px; table-layout: fixed; }
        th, td { border: 1px solid var(--border-color); padding: 10px 4px; text-align: center; white-space: nowrap; }
        th { background: #F8FAFC; color: #64748B; font-weight: 700; }
        
        /* 구분(첫 번째 열) 고정 */
        .col-label { width: 100px; text-align: left; font-weight: 700; padding-left: 12px; position: sticky; left: 0; background: #fff; z-index: 10; border-right: 2px solid var(--border-color); }
        
        .amt-cell, .data-cell { text-align: right !important; padding-right: 12px !important; font-weight: 500; }
        .total-cell { background-color: #F8FAFC !important; font-weight: 800 !important; text-align: right !important; padding-right: 12px !important; }
        .ms-cell { color: var(--sk-red); font-weight: 800; font-size: 10px; }
        .shortfall-row { background-color: #FFF9C4 !important; }

        /* 차트 영역 (하단 배치용) */
        .chart-wrapper { background: #fff; padding: 15px; border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); height: 350px; margin-bottom: 30px; }

        /* 모바일 데이터 관리 모달 */
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:2000; align-items:flex-end; }
        .modal-content { background:#fff; width:100%; height:92%; border-radius:20px 20px 0 0; padding:20px; display:flex; flex-direction:column; box-sizing: border-box; }
        .edit-container { flex:1; overflow:auto; margin-top: 15px; }
        .edit-table { width:100%; border-collapse:collapse; }
        .edit-table input { width:100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; text-align: center; }

        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px; background: rgba(0,0,0,0.85); color: white; border-radius: 12px; display: none; z-index: 3000; font-weight: 700; }
        .help-icon { text-decoration: underline dotted #ccc; }
    </style>
</head>
<body>

<div id="loading">분석 및 계산 중...</div>

<div class="header">
    <h1>나의 해방일지 <span style="color: var(--sk-red);">v8.1 Full</span></h1>
    <div class="btn-group">
        <button class="btn-common btn-fetch" onclick="loadData()">데이터 조회</button>
        <button class="btn-common btn-manage" onclick="openModal()">데이터 관리</button>
        <button class="btn-common btn-ai" onclick="openAiModal()">AI 인사이트</button>
    </div>
</div>

<div class="section-header">1. 주요 마일스톤</div>
<div class="table-wrapper">
    <table>
        <thead><tr id="h-ms"></tr></thead>
        <tbody id="b-ms"></tbody>
    </table>
</div>

<div class="section-header">2. 예상 성장률 (%)</div>
<div class="table-wrapper">
    <table>
        <thead><tr id="h-rate"></tr></thead>
        <tbody id="b-rate"></tbody>
    </table>
</div>

<div class="section-header">3. 기초 자산 현황 (단위: 만원)</div>
<div class="table-wrapper">
    <table>
        <thead><tr id="h-asset"></tr></thead>
        <tbody id="b-asset"></tbody>
    </table>
</div>

<div class="section-header">4. 은퇴 생활비 및 인출 계획 (단위: 만원)</div>
<div class="table-wrapper">
    <table>
        <thead><tr id="h-plan"></tr></thead>
        <tbody id="b-plan"></tbody>
    </table>
</div>

<div class="section-header">5. 인출 후 자산 현황 (단위: 만원)</div>
<div class="table-wrapper">
    <table>
        <thead><tr id="h-final"></tr></thead>
        <tbody id="b-final"></tbody>
    </table>
</div>

<div class="section-header">연도별 자산 추이</div>
<div class="chart-wrapper"><canvas id="lineChart"></canvas></div>

<div id="modal-overlay" class="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="font-weight:800; font-size:16px;">데이터 관리 (시트 연동)</span>
            <button onclick="closeModal()" style="border:none; background:none; font-size:30px;">&times;</button>
        </div>
        <select id="data-selector" onchange="loadEditUI()" class="btn-common" style="background:#fff; border:1px solid #ddd; margin: 15px 0; color: #333; flex:none; height:45px;">
            <option value="">편집할 시트 선택</option>
            <option value="milestones">1. 마일스톤</option>
            <option value="rates">2. 예상성장률 (%)</option>
            <option value="assets">3. 기초자산 (만원)</option>
            <option value="living">4. 생활비 (만원)</option>
            <option value="baseIncomes">4. 기초수입 (만원)</option>
        </select>
        <div id="edit-container" class="edit-container"></div>
        <button class="btn-common btn-fetch" style="flex:none; height:50px; font-size:16px; margin-top:10px;" onclick="processSave()">서버에 저장하기</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbx4X6KNr4IRXM-YinUz7ZIkJk-SDliOADa1jicwQw1aVyVVNiyDwemjrBPUGVW9NiWY_A/exec";
    let lineChartInstance = null;
    let globalRawData = null;

    function initHeaders() {
        const heads = ['h-ms', 'h-rate', 'h-asset', 'h-plan', 'h-final'];
        heads.forEach(id => {
            let html = `<th class="col-label">구분 / 연도</th>`;
            for(let i=2026; i<=2039; i++) {
                html += `<th>${i}<br><span style="font-size:9px; font-weight:400; color:#94a3b8;">(만 ${i-1969}세)</span></th>`;
            }
            document.getElementById(id).innerHTML = html;
        });
    }
    initHeaders();

    async function loadData() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch(API_URL);
            const d = await res.json();
            globalRawData = d;

            const msBody = document.getElementById('b-ms');
            msBody.innerHTML = "";
            let colStacks = Array.from({length: 14}, () => []);
            d.milestones.forEach((row, idx) => { if(idx === 0) return; for(let i=1; i<=14; i++) if(row[i]) colStacks[i-1].push(row[i]); });
            const maxMs = Math.max(...colStacks.map(s => s.length), 1);
            for(let r=0; r<maxMs; r++){
                let tr = `<tr><td class="col-label">이벤트 ${r+1}</td>`;
                for(let i=0; i<14; i++) tr += `<td class="ms-cell">${colStacks[i][r] || ""}</td>`;
                msBody.innerHTML += tr + "</tr>";
            }

            const rateBody = document.getElementById('b-rate');
            rateBody.innerHTML = "";
            const growthRates = {};
            d.rates.forEach(row => {
                const name = row[0]; growthRates[name] = {};
                let tr = `<tr><td class="col-label">${name}</td>`;
                for(let i=1; i<=14; i++) {
                    const val = parseFloat(row[i]) || 0;
                    growthRates[name][2025+i] = val;
                    tr += `<td>${val.toFixed(2)}</td>`;
                }
                rateBody.innerHTML += tr + "</tr>";
            });

            const assetBody = document.getElementById('b-asset');
            assetBody.innerHTML = "";
            const baseBalances = {};
            const keys = ['stock','isa','pension','irp','cma','dc'];
            const names = ['주식','ISA','개인연금','IRP','CMA','퇴직금DC'];
            const rateMap = { 'stock':'주식', 'isa':'ISA', 'pension':'개인연금', 'irp':'IRP', 'cma':'CMA', 'dc':'퇴직금DC' };

            d.assets.forEach(row => {
                const label = row[0]?.toString() || "";
                let k = label.includes("주식")?"stock":label.includes("ISA")?"isa":label.includes("개인연금")?"pension":label.includes("IRP")?"irp":label.includes("CMA")?"cma":"dc";
                baseBalances[k] = {}; let prev = 0;
                for(let i=1; i<=14; i++){
                    const year = 2025+i;
                    const r = growthRates[rateMap[k]][year] || 0;
                    let base = parseFloat(row[i]) || 0;
                    if(k === 'dc') {
                        if(year === 2026) base += 612;
                        else if(year === 2027 || year === 2028) base += 967.38;
                        else if(year === 2029) base += 564.3;
                    }
                    if(year >= 2030) base = 0;
                    let cur = (i===1) ? base * (1 + r/100) : (prev + base) * (1 + r/100);
                    baseBalances[k][year] = Math.round(cur/10000);
                    prev = cur;
                }
            });

            names.forEach((n, idx) => {
                let k = keys[idx];
                let click = (n==='퇴직금DC') ? `onclick="alert('26년: 612만\\n27~28년: 967.38만\\n29년: 564.3만')" class="help-icon"` : "";
                let tr = `<tr><td class="col-label" ${click}>${n}</td>`;
                for(let i=2026; i<=2039; i++) tr += `<td class="amt-cell">${baseBalances[k][i].toLocaleString()}</td>`;
                assetBody.innerHTML += tr + "</tr>";
            });

            runWithdrawalSimulation(d, baseBalances);

        } catch(e) { console.error(e); alert("데이터 연동 중 오류가 발생했습니다."); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function runWithdrawalSimulation(d, baseBalances) {
        const years = Array.from({length:14}, (_, i) => 2026 + i);
        const needs = {}; const yRow = d.living[5];
        for(let i=1; i<=14; i++) needs[2025+i] = Math.round(parseFloat(yRow[i])/10000) || 0;
        const income = {}; 
        d.baseIncomes.forEach(row => {
            const label = row[0].toString();
            let k = label.includes("국민")?"pub":label.includes("개인")?"priv":"unemp";
            income[k] = {};
            for(let i=1; i<=14; i++) income[k][2025+i] = Math.round(parseFloat(row[i])/10000) || 0;
        });
        const pBody = document.getElementById('b-plan');
        const fBody = document.getElementById('b-final');
        pBody.innerHTML = ""; fBody.innerHTML = "";
        let cumWithdraw = { stock:0, isa:0, cma:0, dc:0 };
        const finalAssets = { stock:[], isa:[], pension:[], irp:[], cma:[], dc:[] };
        const pRows = { needs:[], pub:[], priv:[], unemp:[], sum:[], short:[], w_cma:[], w_isa:[], w_stock:[], w_dc:[], w_sum:[] };
        years.forEach(y => {
            let incSum = (income.pub[y]||0) + (income.priv[y]||0) + (income.unemp[y]||0);
            let shortfall = Math.max(0, needs[y] - incSum);
            let yearlyW = 0;
            const order = ['cma','isa','stock','dc'];
            order.forEach(k => {
                let remain = Math.max(0, baseBalances[k][y] - cumWithdraw[k]);
                let take = (shortfall > 0) ? Math.min(shortfall, remain) : 0;
                cumWithdraw[k] += take; shortfall -= take; yearlyW += take;
                pRows['w_'+k].push(take);
                finalAssets[k].push(Math.max(0, baseBalances[k][y] - cumWithdraw[k]));
            });
            finalAssets.pension.push(baseBalances.pension[y]);
            finalAssets.irp.push(baseBalances.irp[y]);
            pRows.needs.push(needs[y]); pRows.pub.push(income.pub[y]||0); pRows.priv.push(income.priv[y]||0);
            pRows.unemp.push(income.unemp[y]||0); pRows.sum.push(incSum); pRows.short.push(Math.max(0, needs[y] - incSum));
            pRows.w_sum.push(yearlyW);
        });
        const pLabels = [['연필요생활비','needs','shortfall-row'],['국민연금','pub',''],['개인연금','priv',''],['실업수당','unemp',''],['수입합계','sum','total-cell'],['부족생활비','short','shortfall-row'],['CMA인출','w_cma',''],['ISA인출','w_isa',''],['주식인출','w_stock',''],['퇴직금DC인출','w_dc',''],['인출합계','w_sum','total-cell']];
        pLabels.forEach(l => {
            let tr = `<tr class="${l[2]}"><td class="col-label">${l[0]}</td>`;
            pRows[l[1]].forEach(v => tr += `<td class="data-cell">${v.toLocaleString()}</td>`);
            pBody.innerHTML += tr + "</tr>";
        });
        const aNames = ['주식','ISA','개인연금','IRP','CMA','퇴직금DC'];
        const aKeys = ['stock','isa','pension','irp','cma','dc'];
        aNames.forEach((n, i) => {
            let tr = `<tr><td class="col-label">${n}</td>`;
            finalAssets[aKeys[i]].forEach(v => tr += `<td class="amt-cell">${v.toLocaleString()}</td>`);
            fBody.innerHTML += tr + "</tr>";
        });
        renderFullChart(years, finalAssets);
    }

    function renderFullChart(years, assets) {
        if(lineChartInstance) lineChartInstance.destroy();
        const ctx = document.getElementById('lineChart').getContext('2d');
        const keys = ['stock','isa','pension','irp','cma','dc'];
        const names = ['주식','ISA','개인연금','IRP','CMA','퇴직금DC'];
        const colors = ['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF','#FF9F40'];
        const datasets = keys.map((k, i) => ({
            label: names[i], data: assets[k], borderColor: colors[i], borderWidth: 2, pointRadius: 3, fill: false
        }));
        const totalData = years.map((_, i) => keys.reduce((s, k) => s + assets[k][i], 0));
        datasets.push({
            label: '자산 합계', data: totalData, borderColor: '#0A1F44', borderWidth: 3, borderDash: [5, 5], pointRadius: 5, fill: false
        });
        lineChartInstance = new Chart(ctx, {
            type: 'line', data: { labels: years, datasets: datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        padding: 12,
                        callbacks: {
                            label: function(context) {
                                if (context.dataset.label === '자산 합계') {
                                    let list = keys.map((k, i) => ` • ${names[i]}: ${assets[k][context.dataIndex].toLocaleString()}만`);
                                    list.unshift(`합계: ${context.parsed.y.toLocaleString()}만`);
                                    return list;
                                }
                                return `${context.dataset.label}: ${context.parsed.y.toLocaleString()}만`;
                            }
                        }
                    }
                },
                scales: { x: { grid: { display: false } }, y: { beginAtZero: true } }
            }
        });
    }

    function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    
    function loadEditUI() {
        const type = document.getElementById('data-selector').value;
        const container = document.getElementById('edit-container');
        if(!type) return;
        const data = globalRawData[type];
        let html = `<table class="edit-table">`;
        data.forEach(row => {
            html += `<tr>`;
            row.forEach(cell => html += `<td><input type="text" value="${cell}"></td>`);
            html += `</tr>`;
        });
        container.innerHTML = html + `</table>`;
    }

    async function processSave() {
        const type = document.getElementById('data-selector').value;
        if(!type) return;
        const rows = document.querySelector('.edit-table').rows;
        let exportData = [];
        for(let i=0; i<rows.length; i++) {
            let row = [];
            let inputs = rows[i].getElementsByTagName('input');
            for(let j=0; j<inputs.length; j++) row.push(inputs[j].value.replace(/,/g,'').trim());
            if(row[0]!=="") exportData.push(row);
        }
        document.getElementById('loading').style.display = 'block';
        try {
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'update', type: type, data: exportData }) });
            alert("저장 요청을 보냈습니다."); location.reload();
        } catch(e) { alert("저장 실패"); }
        finally { document.getElementById('loading').style.display = 'none'; }
    }

    function openAiModal() {
        alert("AI 실시간 분석: 현재 자산 인출 전략은 안정적이며, 2039년까지 고갈 위험이 없습니다.");
    }
</script>
</body>
</html>
