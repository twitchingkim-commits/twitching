<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>경제적 자유 시뮬레이터 - 반응형</title>
    <style>
        /* 1. 기본 디자인 (PC/모바일 공통) */
        :root {
            --primary-color: #2e7d32;
            --bg-color: #f4f7f6;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            line-height: 1.6;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.5rem;
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 25px;
        }

        /* 2. 입력창 레이아웃 (반응형 그리드) */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* 모바일 자동확대 방지 */
            box-sizing: border-box;
            background-color: #fafafa;
        }

        /* 3. 버튼 디자인 */
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:active {
            background-color: #1b5e20;
        }

        /* 4. 결과 테이블 (모바일 대응) */
        .result-container {
            margin-top: 30px;
            overflow-x: auto; /* 화면보다 크면 가로 스크롤 */
            border-radius: 8px;
            border: 1px solid #eee;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px; /* 테이블 뭉개짐 방지 */
        }

        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
            font-size: 0.85rem;
        }

        th {
            background-color: #f8f9fa;
            color: #666;
        }

        .highlight {
            color: var(--primary-color);
            font-weight: bold;
        }

        /* 5. PC용 레이아웃 분기점 (화면이 넓을 때) */
        @media (min-width: 600px) {
            body { padding: 30px; }
            h1 { font-size: 2rem; }
            
            /* 입력창을 2열로 배치 */
            .grid-container {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 20px;
            }
            
            th, td { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>💸 경제적 자유 시뮬레이터</h1>
    
    <div class="grid-container">
        <div class="input-group">
            <label>현재 자산 (만원)</label>
            <input type="number" id="currentAsset" placeholder="예: 5000" value="1000">
        </div>
        <div class="input-group">
            <label>월 저축액 (만원)</label>
            <input type="number" id="monthlySaving" placeholder="예: 200" value="100">
        </div>
        <div class="input-group">
            <label>희망 목표 자산 (억 단위)</label>
            <input type="number" id="targetAsset" placeholder="예: 10" value="5">
        </div>
        <div class="input-group">
            <label>예상 연수익률 (%)</label>
            <input type="number" id="annualReturn" placeholder="예: 7" value="5">
        </div>
    </div>

    <button onclick="calculate()">▶ 성장자산 계산하기</button>

    <div class="result-container">
        <table id="resultTable">
            <thead>
                <tr>
                    <th>연차</th>
                    <th>나이</th>
                    <th>총 자산</th>
                    <th>연 이자수익</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    function calculate() {
        const currentAsset = parseFloat(document.getElementById('currentAsset').value) * 10000;
        const monthlySaving = parseFloat(document.getElementById('monthlySaving').value) * 10000;
        const targetAsset = parseFloat(document.getElementById('targetAsset').value) * 100000000;
        const annualReturn = parseFloat(document.getElementById('annualReturn').value) / 100;
        
        // 사용자 정보 기반 나이 계산 (1969년생 기준)
        let currentAge = new Date().getFullYear() - 1969 + 1;
        let totalAsset = currentAsset;
        const tbody = document.querySelector('#resultTable tbody');
        tbody.innerHTML = '';

        for (let year = 1; year <= 30; year++) {
            let interest = totalAsset * annualReturn;
            totalAsset = totalAsset + interest + (monthlySaving * 12);
            currentAge++;

            const row = `<tr>
                <td>${year}년후</td>
                <td>${currentAge}세</td>
                <td class="highlight">${Math.round(totalAsset / 10000).toLocaleString()}만원</td>
                <td>${Math.round(interest / 10000).toLocaleString()}만원</td>
            </tr>`;
            
            tbody.innerHTML += row;

            if (totalAsset >= targetAsset && targetAsset > 0) break;
        }
    }
    
    // 페이지 로드 시 자동 계산 (샘플)
    window.onload = calculate;
</script>

</body>
</html>
